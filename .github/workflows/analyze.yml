name: Repository Readiness Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Mondays

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for accurate analysis
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run Repository Analysis
        run: |
          # Set environment variables for the action
          export INPUT_REPO="${{ github.repository }}"
          export INPUT_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          export INPUT_CREATE_ISSUE="true"
          export INPUT_MIN_SCORE="70"
          export INPUT_ANALYZE_TEST_COVERAGE="true"
          export INPUT_ANALYZE_DOCUMENTATION="true"
          export INPUT_ANALYZE_WORKFLOWS="true"
          export INPUT_ANALYZE_COMPLEXITY="true"
          export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          
          # Run the action
          node src/index.js
        id: analyzer
      
      - name: Upload Report as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: repository-readiness-report
          path: repo-readiness-report.md